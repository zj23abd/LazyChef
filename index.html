<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyChef - Quick Recipes for those who can't be bothered</title>
    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>LazyChef</h1>
        <p>Quick Recipes, No Stories.</p>
        <!-- SEARCH BAR -->
        <input type="text" id="searchInput" placeholder="Enter ingredients or keywords (comma-separated)">
        <!-- BUTTONS -->
        <button id="randomBtn">Random Recipes</button>
        <button id="darkModeBtn">Toggle Dark Mode</button>
    </header>

    <!-- RECIPE CONTAINER -->
    <div id="recipeContainer">
        <!-- Recipes will be displayed here dynamically -->
    </div>

    <!-- LINK JAVASCRIPT -->
    <script src="script.js"></script>
</body>
</html>
